<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONVA 歴史編纂室 - 東歴1912</title>
    <meta name="description" content="ONVA王国の公式歴史編纂室。建国から現在までの東暦連年史および言語文化の記録。" />
    <meta property="og:title" content="ONVA 歴史編纂室" />
    <meta property="og:description" content="ONVA王国の公式歴史編纂室。建国から現在までの東暦連年史および言語文化の記録。" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ec2045.github.io/onva-history/" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap');

        body {
            font-family: 'Noto Serif JP', serif;
            background-color: #0f172a;
            color: #e2e8f0;
            line-height: 1.8;
        }

        .parchment {
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            border: 1px solid #334155;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .gold-text {
            color: #fbbf24;
            text-shadow: 0 0 8px rgba(251, 191, 36, 0.4);
        }

        .action-btn {
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.3);
        }

        .official-link-btn {
            background: linear-gradient(45deg, #1d4ed8, #2563eb);
            border: 1px solid #60a5fa;
        }

        .border-glow {
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        #history-content {
            white-space: pre-wrap;
        }

        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #fbbf24;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-16">
            <h1 class="text-4xl md:text-6xl font-bold mb-4 gold-text">ONVA Genesis</h1>
            <p class="text-xl text-slate-400 italic">東歴1912年、記述の始まりの記録</p>
        </header>

        <!-- Official Link Banner -->
        <div class="mb-12 p-6 rounded-xl border-glow bg-slate-800/50 text-center">
            <h3 class="text-lg font-bold mb-4 gold-text">現世のONVAポータル</h3>
            <p class="text-slate-300 mb-6">東歴から続く物語の「今」を確認する。</p>
            <a href="https://ec2045.github.io/onva/" target="_blank" rel="noopener noreferrer"
                class="action-btn official-link-btn px-10 py-3 rounded-full font-bold text-white shadow-lg">
                ONVA 公式サイトへ飛ぶ 🔗
            </a>
        </div>

        <!-- Dynamic Content Area -->
        <main class="parchment p-6 md:p-12 rounded-lg mb-12">
            <div id="loading" class="flex flex-col items-center justify-center py-12">
                <div class="loading-spinner mb-4"></div>
                <p class="text-slate-400 italic">歴史記録「onva.txt」を読み込み中...</p>
            </div>

            <div id="history-content" class="hidden text-lg leading-relaxed text-slate-200">
                <!-- ここに onva.txt の中身が読み込まれます -->
            </div>

            <div id="error-message" class="hidden text-red-400 text-center py-12">
                歴史記録の読み込みに失敗しました。ファイルが同階層に存在するか確認してください。
            </div>
        </main>

        <!-- Download Section -->
        <section
            class="flex flex-col items-center justify-center p-8 border-2 border-dashed border-amber-700 rounded-xl">
            <h3 class="text-xl font-bold mb-4">記録を物理的に保持する</h3>
            <p class="text-slate-400 mb-6 text-center">この歴史のすべてを再びテキストファイルとして書き出します。</p>
            <button onclick="downloadHistory()"
                class="action-btn bg-amber-700 px-8 py-3 rounded-full font-bold text-white shadow-lg">
                onva.txt として保存 💾
            </button>
        </section>

        <footer class="mt-20 text-center text-slate-500 text-sm">
            &copy; 東歴1912-2024 ONVA Archive Project / Art Creator R
        </footer>
    </div>

    <script>
        // ページ読み込み時に onva.txt を取得する
        window.onload = async function () {
            const historyEl = document.getElementById('history-content');
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error-message');

            try {
                // fetch API を使用して外部ファイルを読み込む
                const response = await fetch('onva.txt');
                if (!response.ok) throw new Error('File not found');

                const text = await response.text();

                // コンテンツを流し込み、表示を切り替える
                historyEl.textContent = text;
                historyEl.classList.remove('hidden');
                loadingEl.classList.add('hidden');
            } catch (err) {
                loadingEl.classList.add('hidden');
                errorEl.classList.remove('hidden');
                console.error('Error loading onva.txt:', err);
            }
        };

        function downloadHistory() {
            const textContent = document.getElementById('history-content').textContent;
            if (!textContent) return;

            const blob = new Blob([textContent], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'onva.txt';
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }
    </script>
</body>

</html>
